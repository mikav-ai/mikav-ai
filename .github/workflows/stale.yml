name: Stale Issues & PRs

on:
  schedule:
    - cron: "0 9 * * 1"

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 30
          days-before-close: 7
          stale-issue-message: |
            This issue has been inactive for 30 days. It will be closed in 7 days if there's no further activity. Feel free to reopen if it's still relevant.
          stale-pr-message: |
            This PR has been inactive for 30 days. It will be closed in 7 days if there's no further activity. Please update or reopen if still needed.
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,priority
          exempt-pr-labels: pinned,priority
