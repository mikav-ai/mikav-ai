name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Welcome to Mikav! 🙏 Thanks for opening your first issue.
            Our team will review it soon. In the meantime, check out our [Contributing Guide](https://github.com/mikav-ai/mikav-ai/blob/main/CONTRIBUTING.md).
          pr-message: |
            Welcome to Mikav! 🙏 Thanks for your first pull request.
            A maintainer will review it shortly. Make sure your PR follows our [Contributing Guide](https://github.com/mikav-ai/mikav-ai/blob/main/CONTRIBUTING.md).
